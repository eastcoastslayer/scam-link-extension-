<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scam Link Detector Settings</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="container">

    <h1>⚙️ Security Settings</h1>

    <div class="status-card">
      <h2>Protection Controls</h2>

      <label>
        <input type="checkbox" id="protection-toggle" checked>
        Enable real-time protection
      </label>

      <br><br>

      <label>
        <input type="checkbox" id="aggressive-toggle" checked>
        Aggressive scam detection
      </label>

      <br><br>

      <label>
        <input type="checkbox" id="popup-toggle" checked>
        Detect fake popups and scam ads
      </label>

      <br><br>

      <label>
        <input type="checkbox" id="download-toggle" checked>
        Warn about dangerous downloads
      </label>
    </div>

    <div class="results-card">
      <h2>History Controls</h2>

      <button id="clear-history-button">
        Clear Scan History
      </button>
    </div>

    <div class="history-card">
      <h2>Future AI Security Modes</h2>

      <p>Coming later:</p>

      <ul>
        <li>AI phishing analysis</li>
        <li>Live scam database updates</li>
        <li>Community scam reports</li>
        <li>Email and social media link scanning</li>
      </ul>
    </div>

  </div>

  <script src="options.js"></script>

</body>
</html>
